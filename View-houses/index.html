<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StayLoo | Independent Houses for Rent — Verified Listings</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f9fe;
            color: #0a2540;
            line-height: 1.5;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 2rem;
        }

        /* Header with logo left & page title right */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(44, 125, 160, 0.25);
        }

        .logo-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 52px;
            width: auto;
            object-fit: contain;
            background: transparent;
        }

        /* Fallback logo if image missing - show text */
        .logo-text-fallback {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f2b3d, #1c6a8f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .page-title-right {
            text-align: right;
        }

        .page-tagline {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c6a8f;
            background: #eef2f8;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #eef2f8;
        }

        .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c5a7a;
        }

        .filter-group select,

            width: 100%;
            padding: 10px 12px;
            border-radius: 60px;
            border: 1px solid #cbdde9;
            background: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #1c6a8f;
            box-shadow: 0 0 0 2px rgba(28,106,143,0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-filter, .btn-reset {
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn-filter {
            background: #1c6a8f;
            color: white;
        }

        .btn-filter:hover {
            background: #0f4b66;
        }

        .btn-reset {
            background: #eef2f8;
            color: #1e405b;
        }

        .btn-reset:hover {
            background: #e2e8f0;
        }

        /* Properties Grid */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .property-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card-img {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .property-code-badge {
            position: absolute;
            top: 12px;
            right: 12px;

            font-family: monospace;
            font-weight: 600;

            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-location {

            margin-bottom: 8px;
        }

            font-size: 0.85rem;

            visibility: hidden;
            opacity: 0;

        .modal-overlay.active {

            font-size: 0.8rem;

            margin-bottom: 1rem;

        .send-query-btn {

            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .send-query-btn:hover {

        }

        .close-modal {
            position: sticky;
            top: 10px;
            right: 20px;
            float: right;
            background: white;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 50%;

            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Footer */
        .main-footer {
            background: #0a1e2c;
            margin-top: 3rem;
            padding: 2rem 1.5rem 1.5rem;
            color: #cbdde9;
        }

        .footer-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1.5rem;

            color: white;

            color: #bdd3e6;

            font-size: 0.8rem;
            margin-bottom: 0.5rem;

            padding-top: 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.75rem;

        /* Responsive Styles */
        @media (max-width: 700px) {
            .filter-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {

                min-width: auto;
            }

                justify-content: center;

            }

                font-size: 0.8rem;

            }
            .modal-img {

                height: 120px;

            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            cursor: pointer;
        }
        .fullscreen-viewer.active {
            visibility: visible;
            opacity: 1;
        }
        .fullscreen-img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .close-fullscreen {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;

        a, button { text-decoration: none; outline: none; }

        .no-image-fallback {
            background: linear-gradient(135deg, #cbdde9, #a0c0d4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;

    </style>
</head>

<!-- Modal for property details -->

        },
        {

        },
        {

            images: ["https://picsum.photos/id/104/400/300", "https://picsum.photos/id/111/400/300", "https://picsum.photos/id/112/400/300"],
            desc: "Newly renovated independent house with designer interiors, close to cafes & tech offices.",

        },

            desc: "Spacious independent floor with garden, excellent connectivity to expressway.", 
            size: "1500 sqft", floor: "First Floor", available: "15 days", features: "Parking, Garden, Power Backup"
        }
    ];

    // Helper: fix image loading error - replace with placeholder but we use picsum so reliable, but for robustness:
    function handleImageError(imgElement) {
        if (!imgElement.src.includes('placehold')) {
            imgElement.src = 'https://picsum.photos/id/20/400/300?grayscale';
        }
    }

    // Render cards
    function renderCards(filteredProps) {
        const grid = document.getElementById('propertiesGrid');
        if (!filteredProps.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 3rem; background: white; border-radius: 1.5rem;"><i class="fas fa-home" style="font-size: 2rem; color: #1c6a8f;"></i><h3 style="margin: 1rem 0;">🏠 No independent houses match your criteria.</h3><p>Try resetting filters or exploring other cities.</p></div>`;
            return;
        }
        grid.innerHTML = filteredProps.map(prop => `
            <div class="property-card" data-id="${prop.id}" onclick="openModal('${prop.id}')">
                <div class="card-img" style="background-image: url('${prop.images[0]}'); background-size: cover; background-position: center;">
                    <span class="property-code-badge">📌 ${prop.code}</span>
                </div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(prop.title)}</div>
                    <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(prop.area)}, ${escapeHtml(prop.city)}</div>
                    <div class="card-details"><span>🏠 ${prop.bhk}</span><span>📏 ${prop.size}</span></div>
                    <div class="price">₹${prop.price.toLocaleString()}/month</div>
                    <div class="view-details"><i class="fas fa-eye"></i> View Details</div>
                </div>
            </div>
        `).join('');
    }

    // Simple escape to avoid XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Filter logic
    function getFilteredProperties() {
        const city = document.getElementById('cityFilter').value;
        const areaQuery = document.getElementById('areaFilter').value.toLowerCase().trim();
        const budgetVal = document.getElementById('budgetFilter').value;
        const bhk = document.getElementById('bhkFilter').value;
        return properties.filter(prop => {
            if (city !== 'all' && prop.city !== city) return false;
            if (areaQuery && !prop.area.toLowerCase().includes(areaQuery)) return false;
            if (bhk !== 'all' && prop.bhk !== bhk) return false;
            if (budgetVal !== 'any') {
                const maxBudget = parseInt(budgetVal);
                if (prop.price > maxBudget) return false;
            }
            return true;
        });
    }

    function applyFilters() { 
        renderCards(getFilteredProperties()); 
    }
    
    function resetFilters() {
        document.getElementById('cityFilter').value = 'all';
        document.getElementById('areaFilter').value = '';
        document.getElementById('budgetFilter').value = 'any';
        document.getElementById('bhkFilter').value = 'all';
        applyFilters();
    }
    
    // Fullscreen image viewer
    const fullscreenDiv = document.getElementById('fullscreenViewer');
    const fullscreenImg = fullscreenDiv.querySelector('.fullscreen-img');
    const closeFullscreen = fullscreenDiv.querySelector('.close-fullscreen');
    
    function openFullscreen(src) { 
        if(!src) return;
        fullscreenImg.src = src; 
        fullscreenDiv.classList.add('active'); 
        document.body.style.overflow = 'hidden'; 
    }
    
    function closeFullscreenFunc() { 
        fullscreenDiv.classList.remove('active'); 
        document.body.style.overflow = ''; 
        fullscreenImg.src = '';
    }
    
    closeFullscreen.addEventListener('click', closeFullscreenFunc);
    fullscreenDiv.addEventListener('click', (e) => { if(e.target === fullscreenDiv) closeFullscreenFunc(); });
    window.openFullscreen = openFullscreen;

    // Modal logic
    let currentProperty = null;
    function openModal(propertyId) {
        const prop = properties.find(p => p.id === propertyId);
        if (!prop) return;
        currentProperty = prop;
        const modal = document.getElementById('propertyModal');
        const modalContent = document.getElementById('modalContent');
        // Create gallery images with error handling and onclick fullscreen
        const galleryHtml = prop.images.map(img => `<img class="modal-img" src="${img}" alt="property view" loading="lazy" onclick="openFullscreen('${img}')" onerror="this.src='https://picsum.photos/id/20/400/300'">`).join('');
        modalContent.innerHTML = `
            <div class="modal-img-gallery">${galleryHtml || '<div class="no-image-fallback" style="width:100%; padding:30px; text-align:center;">📸 No images available</div>'}</div>
            <div class="modal-body">
                <span class="modal-property-code"><i class="fas fa-tag"></i> Property Code: <strong>${escapeHtml(prop.code)}</strong> (ID: ${prop.id})</span>
                <h2 style="margin: 12px 0 8px">${escapeHtml(prop.title)}</h2>
                <p><i class="fas fa-location-dot"></i> ${escapeHtml(prop.area)}, ${escapeHtml(prop.city)}</p>
                <div style="display: flex; gap: 1rem; margin: 12px 0; flex-wrap: wrap;">
                    <span><i class="fas fa-bed"></i> ${prop.bhk}</span>
                    <span><i class="fas fa-arrows-alt"></i> ${prop.size}</span>
                    <span><i class="fas fa-layer-group"></i> ${prop.floor}</span>
                    <span><i class="fas fa-calendar"></i> Available: ${prop.available}</span>
                </div>
                <div style="background: #f0f7fb; padding: 14px; border-radius: 16px; margin: 12px 0;">
                    <strong>📝 Description:</strong><br> ${escapeHtml(prop.desc)}<br><br>
                    <strong>✨ Features:</strong><br> ${escapeHtml(prop.features)}
                </div>
                <div style="margin-top: 12px;"><strong>💰 Rent:</strong> ₹${prop.price.toLocaleString()} / month</div>
                <button id="sendWhatsAppBtn" class="send-query-btn"><i class="fab fa-whatsapp"></i> Send Query on WhatsApp</button>
            </div>
        `;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        const whatsBtn = document.getElementById('sendWhatsAppBtn');
        if (whatsBtn) {
            whatsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // Verified WhatsApp number as per requirement
                const YOUR_WHATSAPP = "917311170545"; 
                const msg = `🏠 *Independent House Inquiry*%0A%0AProperty: ${currentProperty.title}%0ACode: ${currentProperty.code} (ID: ${currentProperty.id})%0ALocation: ${currentProperty.area}, ${currentProperty.city}%0ABHK: ${currentProperty.bhk}%0ARent: ₹${currentProperty.price}%0A%0AI'm interested. Please share more details.`;
                window.open(`https://wa.me/${YOUR_WHATSAPP}?text=${msg}`, '_blank');
            });
        }
    }
    
    const modal = document.getElementById('propertyModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    function closeModalFunc() { 
        modal.classList.remove('active'); 
        document.body.style.overflow = ''; 
    }
    closeModalBtn.addEventListener('click', closeModalFunc);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
    window.openModal = openModal;

    // Event Listeners
    document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);
    document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
    
    // Initial render show all houses
    window.addEventListener('DOMContentLoaded', () => { 
        renderCards(properties); 
        // Fix for any missing logo image fallback show text
        const logoImg = document.querySelector('.logo-img');
        if(logoImg && logoImg.complete && logoImg.naturalWidth === 0) {
            logoImg.style.display = 'none';
            const fallback = document.querySelector('.logo-text-fallback');
            if(fallback) fallback.style.display = 'block';
        } else if(logoImg) {
            logoImg.onerror = function() {
                this.style.display = 'none';
                const fallback = document.querySelector('.logo-text-fallback');
                if(fallback) fallback.style.display = 'block';
            };
        }
    });
</script>
</body>
</html>
