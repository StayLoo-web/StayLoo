<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StayLoo | PG Accommodations — Verified Listings for Bachelors & Working Professionals</title>
    <link rel="icon" type="image/png" href="../images/FEVICON.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f9fe;
            color: #0a2540;
            line-height: 1.5;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 2rem;
        }

        /* Header styles - Logo LEFT, Title RIGHT on ALL screens */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(44, 125, 160, 0.25);
        }

        .logo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-img {
            height: 52px;
            width: auto;
            object-fit: contain;
            background: transparent;
        }

        .logo-text-fallback {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f2b3d, #1c6a8f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: none;
        }

        .page-title-right {
            text-align: right;
            flex-shrink: 0;
        }

        .page-tagline {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c6a8f;
            background: #eef2f8;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            white-space: nowrap;
        }

        /* Filter Section - FULL WIDTH and CENTERED buttons */
        .filter-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #eef2f8;
        }

        .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c5a7a;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 60px;
            border: 1px solid #cbdde9;
            background: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #1c6a8f;
            box-shadow: 0 0 0 2px rgba(28,106,143,0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
        }

        .btn-filter, .btn-reset {
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn-filter {
            background: #1c6a8f;
            color: white;
        }

        .btn-filter:hover {
            background: #0f4b66;
        }

        .btn-reset {
            background: #eef2f8;
            color: #1e405b;
        }

        .btn-reset:hover {
            background: #e2e8f0;
        }

        /* Properties Grid */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .property-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card-img {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .property-code-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            font-weight: 600;
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-location {
            color: #1c6a8f;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .card-details {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #5c7c9a;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .price {
            font-weight: 800;
            color: #0f2b3d;
            font-size: 1.2rem;
        }

        .view-details {
            margin-top: 12px;
            background: #eef2f8;
            padding: 8px;
            text-align: center;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1c6a8f;
        }

        /* Modal Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            max-width: 750px;
            width: 90%;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .modal-img-gallery {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 1.2rem;
            background: #f8fafc;
        }

        .modal-img {
            width: 200px;
            height: 160px;
            object-fit: cover;
            border-radius: 1rem;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-img:hover {
            transform: scale(1.03);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-property-code {
            background: #eef2f8;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .send-query-btn {
            background: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .send-query-btn:hover {
            background: #128C7E;
        }

        .close-modal {
            position: sticky;
            top: 10px;
            right: 20px;
            float: right;
            background: white;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Footer */
        .main-footer {
            background: #0a1e2c;
            margin-top: 3rem;
            padding: 2rem 1.5rem 1.5rem;
            color: #cbdde9;
        }

        .footer-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .footer-col {
            flex: 1;
            min-width: 130px;
        }

        .footer-col h5 {
            color: white;
            margin-bottom: 0.8rem;
        }

        .footer-col a {
            display: block;
            color: #bdd3e6;
            text-decoration: none;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .copyright {
            text-align: center;
            border-top: 1px solid #1f4057;
            padding-top: 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.75rem;
        }

        /* ========== RESPONSIVE FIXES ========== */
        /* Header: Force logo left + title right on ALL screens */
        @media (max-width: 700px) {
            .header-flex {
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                flex-wrap: nowrap !important;
            }
            .logo-left {
                flex-shrink: 0;
            }
            .logo-img {
                height: 40px;
            }
            .page-title-right {
                flex-shrink: 0;
                text-align: right;
            }
            .page-tagline {
                font-size: 0.75rem;
                padding: 4px 12px;
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .page-tagline {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            .logo-img {
                height: 35px;
            }
        }

        /* Filter buttons alignment fix for small screens */
        @media (max-width: 700px) {
            .filter-grid {
                flex-direction: column;
                width: 100%;
            }
            .filter-group {
                width: 100%;
                min-width: auto;
            }
            .filter-buttons {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 12px;
                margin-top: 8px;
                width: 100%;
            }
            .btn-filter, .btn-reset {
                flex: 1;
                text-align: center;
                justify-content: center;
                padding: 10px 16px;
                min-width: 120px;
            }
            .properties-grid {
                grid-template-columns: 1fr;
            }
            .modal-img {
                width: 150px;
                height: 120px;
            }
        }

        @media (max-width: 480px) {
            .filter-buttons {
                flex-direction: column;
                gap: 8px;
            }
            .btn-filter, .btn-reset {
                width: 100%;
                min-width: auto;
            }
        }

        /* Fullscreen image viewer */
        .fullscreen-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            cursor: pointer;
        }
        .fullscreen-viewer.active {
            visibility: visible;
            opacity: 1;
        }
        .fullscreen-img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .close-fullscreen {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="main-content">
        <div class="container">
            <!-- Header: Logo LEFT, "PG Accommodations" RIGHT - both sides always -->
            <div class="header-flex">
                <div class="logo-left">
                    <img class="logo-img" src="../images/logo1.png" alt="StayLoo Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="logo-text-fallback">StayLoo</div>
                </div>
                <div class="page-title-right">
                    <div class="page-tagline"><i class="fas fa-bed"></i> PG Accommodations</div>
                </div>
            </div>

            <!-- Filters - buttons centered on mobile, aligned left on desktop -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>🏙️ City</label>
                        <select id="cityFilter">
                            <option value="all">All Cities</option>
                            <option value="Lucknow">Lucknow</option>
                            <option value="Delhi NCR">Delhi NCR</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Pune">Pune</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>📍 Area / Locality</label>
                        <input type="text" id="areaFilter" placeholder="e.g., Gomti Nagar">
                    </div>
                    <div class="filter-group">
                        <label>💰 Max Rent (₹)</label>
                        <select id="budgetFilter">
                            <option value="any">Any</option>
                            <option value="8000">Up to ₹8,000</option>
                            <option value="12000">Up to ₹12,000</option>
                            <option value="18000">Up to ₹18,000</option>
                            <option value="25000">Up to ₹25,000</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>👥 Sharing Type</label>
                        <select id="sharingFilter">
                            <option value="all">All</option>
                            <option value="Single">Single Room</option>
                            <option value="Double">Double Sharing</option>
                            <option value="Triple">Triple Sharing</option>
                            <option value="Dorm">Dormitory</option>
                        </select>
                    </div>
                    <div class="filter-buttons">
                        <button class="btn-filter" id="applyFilterBtn"><i class="fas fa-sliders-h"></i> Apply Filter</button>
                        <button class="btn-reset" id="resetFilterBtn"><i class="fas fa-undo-alt"></i> Reset</button>
                    </div>
                </div>
            </div>

            <!-- Properties Grid -->
            <div id="propertiesGrid" class="properties-grid"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-inner">
            <div class="footer-col"><h5>StayLoo</h5><a href="/about-us/">About Us</a><a href="/contact-us/">Contact Us</a></div>
            <div class="footer-col"><h5>Explore</h5><a href="/View-flats/">Flats & Apartments</a><a href="/View-houses/">Houses</a><a href="/View-rooms/">Rooms</a></div>
            <div class="footer-col"><h5>Support</h5><a href="/pricing-queries/">Pricing & Queries</a><a href="/privacy-policies/">Privacy Policy</a><a href="/Terms-conditions/">Terms of Service</a></div>
            <div class="footer-col"><h5>Connect</h5><a href="#"><i class="fab fa-whatsapp"></i> WhatsApp</a><a href="#"><i class="fab fa-instagram"></i> Instagram</a></div>
        </div>
        <div class="copyright">© 2026 StayLoo — Move with ease. Verified PG accommodations.</div>
    </footer>
</div>

<!-- Modal for property details -->
<div id="propertyModal" class="modal-overlay">
    <div class="modal-container">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<!-- Fullscreen image viewer -->
<div id="fullscreenViewer" class="fullscreen-viewer">
    <button class="close-fullscreen">&times;</button>
    <img class="fullscreen-img" src="" alt="Full Screen View">
</div>

<script>
    // ========== PG ACCOMMODATIONS DATABASE (with unique IDs) ==========
    let pgProperties = [
        { 
            id: "PG001", code: "PG-1001", city: "Lucknow", area: "Gomti Nagar", 
            title: "Zolo Stellar PG", sharing: "Double", price: 12000,
            images: ["https://picsum.photos/id/106/400/300", "https://picsum.photos/id/107/400/300", "https://picsum.photos/id/108/400/300"],
            desc: "Premium PG for working professionals, includes meals, WiFi, AC, geyser.", 
            features: "Meals included, WiFi, AC, Power backup, Housekeeping"
        },
        { 
            id: "PG002", code: "PG-1002", city: "Bangalore", area: "Koramangala", 
            title: "Kora Men's PG", sharing: "Single", price: 18000,
            images: ["https://picsum.photos/id/1/400/300", "https://picsum.photos/id/2/400/300", "https://picsum.photos/id/3/400/300"],
            desc: "Executive single room PG near tech parks, fully furnished.", 
            features: "Attached bathroom, WiFi, TV, Gym access"
        },
        { 
            id: "PG003", code: "PG-1003", city: "Delhi NCR", area: "Dwarka", 
            title: "Dwarka Elite PG", sharing: "Triple", price: 9000,
            images: ["https://picsum.photos/id/20/400/300", "https://picsum.photos/id/21/400/300", "https://picsum.photos/id/22/400/300"],
            desc: "Budget-friendly triple sharing PG with homely food.", 
            features: "Food included, WiFi, Parking, CCTV"
        },
        { 
            id: "PG004", code: "PG-1004", city: "Mumbai", area: "Andheri", 
            title: "Andheri Comfort PG", sharing: "Double", price: 15000,
            images: ["https://picsum.photos/id/29/400/300", "https://picsum.photos/id/30/400/300", "https://picsum.photos/id/31/400/300"],
            desc: "Near metro station, double sharing for bachelors.", 
            features: "AC, WiFi, Laundry, Meals optional"
        },
        { 
            id: "PG005", code: "PG-1005", city: "Pune", area: "Hinjewadi", 
            title: "Hinjewadi Elite PG", sharing: "Single", price: 14000,
            images: ["https://picsum.photos/id/104/400/300", "https://picsum.photos/id/111/400/300", "https://picsum.photos/id/112/400/300"],
            desc: "Premium single room PG with attached washroom, near IT park.", 
            features: "AC, WiFi, Meals, Gym, Power Backup"
        },
        { 
            id: "PG006", code: "PG-1006", city: "Lucknow", area: "Indira Nagar", 
            title: "Indira Nagar Ladies PG", sharing: "Double", price: 10000,
            images: ["https://picsum.photos/id/115/400/300", "https://picsum.photos/id/116/400/300", "https://picsum.photos/id/117/400/300"],
            desc: "Safe and secure PG for working women, homely environment.", 
            features: "Food included, CCTV, Women only, WiFi"
        }
    ];

    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, function(m) { 
            if (m === '&') return '&amp;'; 
            if (m === '<') return '&lt;'; 
            if (m === '>') return '&gt;'; 
            return m; 
        }); 
    }

    function renderCards(filteredProps) {
        const grid = document.getElementById('propertiesGrid');
        if (!filteredProps.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 3rem; background: white; border-radius: 1.5rem;"><i class="fas fa-bed" style="font-size: 2rem; color: #1c6a8f;"></i><h3 style="margin: 1rem 0;">🏠 No PG accommodations match your criteria.</h3><p>Try resetting the filters to see all listings.</p></div>`;
            return;
        }
        grid.innerHTML = filteredProps.map(prop => `
            <div class="property-card" data-id="${prop.id}" onclick="openModal('${prop.id}')">
                <div class="card-img" style="background-image: url('${prop.images[0]}'); background-size: cover; background-position: center;">
                    <span class="property-code-badge">📌 ${prop.code}</span>
                </div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(prop.title)}</div>
                    <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(prop.area)}, ${escapeHtml(prop.city)}</div>
                    <div class="card-details"><span>👥 ${prop.sharing}</span><span>💰 ₹${prop.price.toLocaleString()}/month</span></div>
                    <div class="price">₹${prop.price.toLocaleString()}/month</div>
                    <div class="view-details"><i class="fas fa-eye"></i> View Details</div>
                </div>
            </div>
        `).join('');
    }

    function getFilteredProperties() {
        const city = document.getElementById('cityFilter').value;
        const areaQuery = document.getElementById('areaFilter').value.toLowerCase().trim();
        const budgetVal = document.getElementById('budgetFilter').value;
        const sharing = document.getElementById('sharingFilter').value;
        return pgProperties.filter(prop => {
            if (city !== 'all' && prop.city !== city) return false;
            if (areaQuery && !prop.area.toLowerCase().includes(areaQuery)) return false;
            if (sharing !== 'all' && prop.sharing !== sharing) return false;
            if (budgetVal !== 'any') { 
                const maxBudget = parseInt(budgetVal); 
                if (prop.price > maxBudget) return false; 
            }
            return true;
        });
    }

    function applyFilters() { renderCards(getFilteredProperties()); }
    function resetFilters() {
        document.getElementById('cityFilter').value = 'all';
        document.getElementById('areaFilter').value = '';
        document.getElementById('budgetFilter').value = 'any';
        document.getElementById('sharingFilter').value = 'all';
        applyFilters();
    }

    // Fullscreen logic
    const fullscreenDiv = document.getElementById('fullscreenViewer');
    const fullscreenImg = fullscreenDiv.querySelector('.fullscreen-img');
    const closeFullscreen = fullscreenDiv.querySelector('.close-fullscreen');
    function openFullscreen(src) { 
        fullscreenImg.src = src; 
        fullscreenDiv.classList.add('active'); 
        document.body.style.overflow = 'hidden'; 
    }
    function closeFullscreenFunc() { 
        fullscreenDiv.classList.remove('active'); 
        document.body.style.overflow = ''; 
        fullscreenImg.src = '';
    }
    closeFullscreen.addEventListener('click', closeFullscreenFunc);
    fullscreenDiv.addEventListener('click', (e) => { if(e.target === fullscreenDiv) closeFullscreenFunc(); });
    window.openFullscreen = openFullscreen;

    // Modal for PG details
    let currentPG = null;
    function openModal(propertyId) {
        const prop = pgProperties.find(p => p.id === propertyId);
        if (!prop) return;
        currentPG = prop;
        const modal = document.getElementById('propertyModal');
        const modalContent = document.getElementById('modalContent');
        const galleryHtml = prop.images.map(img => `<img class="modal-img" src="${img}" alt="PG view" loading="lazy" onclick="openFullscreen('${img}')" onerror="this.src='https://picsum.photos/id/20/400/300'">`).join('');
        modalContent.innerHTML = `
            <div class="modal-img-gallery">${galleryHtml || '<div style="padding:30px">No images available</div>'}</div>
            <div class="modal-body">
                <span class="modal-property-code"><i class="fas fa-tag"></i> PG Code: <strong>${escapeHtml(prop.code)}</strong> (ID: ${prop.id})</span>
                <h2 style="margin: 12px 0 8px">${escapeHtml(prop.title)}</h2>
                <p><i class="fas fa-location-dot"></i> ${escapeHtml(prop.area)}, ${escapeHtml(prop.city)}</p>
                <div style="display: flex; gap: 1rem; margin: 12px 0; flex-wrap: wrap;">
                    <span><i class="fas fa-users"></i> ${prop.sharing}</span>
                    <span><i class="fas fa-rupee-sign"></i> ₹${prop.price.toLocaleString()}/month</span>
                </div>
                <div style="background: #f0f7fb; padding: 14px; border-radius: 16px; margin: 12px 0;">
                    <strong>📝 Description:</strong><br> ${escapeHtml(prop.desc) || 'Comfortable PG with all amenities.'}<br><br>
                    <strong>✨ Features:</strong><br> ${escapeHtml(prop.features) || 'WiFi, Food, Housekeeping'}
                </div>
                <button id="sendWhatsAppBtn" class="send-query-btn"><i class="fab fa-whatsapp"></i> Send Query on WhatsApp</button>
            </div>
        `;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        const whatsBtn = document.getElementById('sendWhatsAppBtn');
        if (whatsBtn) {
            whatsBtn.addEventListener('click', () => {
                const YOUR_WHATSAPP = "917311170545";
                const msg = `🏠 *PG Accommodation Inquiry*%0A%0APG: ${currentPG.title}%0ACode: ${currentPG.code}%0ALocation: ${currentPG.area}, ${currentPG.city}%0ASharing: ${currentPG.sharing}%0ARent: ₹${currentPG.price}%0A%0AI'm interested. Please share more details.`;
                window.open(`https://wa.me/${YOUR_WHATSAPP}?text=${msg}`, '_blank');
            });
        }
    }

    // Modal close handlers
    const modal = document.getElementById('propertyModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    function closeModalFunc() { 
        modal.classList.remove('active'); 
        document.body.style.overflow = ''; 
    }
    closeModalBtn.addEventListener('click', closeModalFunc);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
    window.openModal = openModal;

    // Event listeners for filters
    document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);
    document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
    
    // Initial render
    window.addEventListener('DOMContentLoaded', () => { 
        renderCards(pgProperties); 
        // Fix logo fallback
        const logoImg = document.querySelector('.logo-img');
        if(logoImg && logoImg.complete && logoImg.naturalWidth === 0) {
            logoImg.style.display = 'none';
            const fallback = document.querySelector('.logo-text-fallback');
            if(fallback) fallback.style.display = 'block';
        } else if(logoImg) {
            logoImg.onerror = function() {
                this.style.display = 'none';
                const fallback = document.querySelector('.logo-text-fallback');
                if(fallback) fallback.style.display = 'block';
            };
        }
    });
</script>
</body>
</html>
