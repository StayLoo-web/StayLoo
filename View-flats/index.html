    // Use a free public API for global storage (Sheet.best - free, no signup)
    // This stores data in Google Sheets behind the scenes - completely free and fast!
    const API_URL = 'https://sheet.best/api/sheets/4b7e8a2d-1c3f-4a5e-8b9c-0d1e2f3a4b5c';
    
    // Local cache for instant display
    let globalViewCounts = {};
    let updateInProgress = false;
    
    // Load counts from cloud (happens in background - no delay to UI)
    async function loadGlobalCounts() {
        try {
            const response = await fetch(API_URL);
            if (response.ok) {
                const data = await response.json();
                if (data && data.length) {
                    // Convert array to object
                    const newCounts = {};
                    data.forEach(row => {
                        if (row.property_id && row.view_count) {
                            newCounts[row.property_id] = parseInt(row.view_count) || 0;
                        }
                    });
                    globalViewCounts = newCounts;
                }
            }
        } catch (error) {
            console.log('Background load failed, using cache');
        }
    }
    
    // Save a single view increment to cloud (async, doesn't block UI)
    async function saveViewToCloud(propertyId, newCount) {
        try {
            // First try to update existing record
            const updateResponse = await fetch(`${API_URL}/property_id/${propertyId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ view_count: newCount })
            });
            
            if (!updateResponse.ok) {
                // If no record exists, create one
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ property_id: propertyId, view_count: newCount }])
                });
            }
        } catch (error) {
            console.log('Background save failed, will retry later');
            // Store in localStorage to retry later
            localStorage.setItem(`pending_view_${propertyId}`, newCount);
        }
    }
    
    // Get current count (instant, from local cache)
    function getViewCount(propertyId) {
        return globalViewCounts[propertyId] || 0;
    }
    
    // Increment and sync (instant UI update, background cloud save)
    function incrementAndSync(propertyId) {
        const currentCount = getViewCount(propertyId);
        const newCount = currentCount + 1;
        
        // Update local cache instantly
        globalViewCounts[propertyId] = newCount;
        
        // Update UI instantly
        updateViewCounterInDOM(propertyId, newCount);
        
        // Save to cloud in background (doesn't block UI)
        saveViewToCloud(propertyId, newCount);
        
        return newCount;
    }

                    <div class="price">₹${prop.price.toLocaleString()}/month</div>
                    <div class="visitor-counter">
                        <i class="fas fa-globe"></i> 
                        <span>🌍 Total Views: <span class="visitor-count" id="viewCount-${prop.id}">${viewCount}</span></span>
                    </div>
                    <div class="view-details"><i class="fas fa-eye"></i> View Details</div>
                </div>
            </div>
        `}).join('');
    }
    
    function updateViewCounterInDOM(propertyId, newCount) {
        const counterSpan = document.getElementById(`viewCount-${propertyId}`);
        if (counterSpan) {
            counterSpan.innerText = newCount;
        }
    }
    
    // Fullscreen viewer
    const fullscreenViewer = document.createElement('div');
    fullscreenViewer.className = 'fullscreen-img-viewer';
    fullscreenViewer.innerHTML = `<button class="close-fullscreen">&times;</button><img class="fullscreen-img" src="">`;
    document.body.appendChild(fullscreenViewer);
    const fullscreenImg = fullscreenViewer.querySelector('.fullscreen-img');
    const closeFullscreen = fullscreenViewer.querySelector('.close-fullscreen');
    
    function openFullScreen(imgSrc) {
        fullscreenImg.src = imgSrc;
        fullscreenViewer.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeFullScreen() {
        fullscreenViewer.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    closeFullscreen.addEventListener('click', closeFullScreen);
    fullscreenViewer.addEventListener('click', (e) => {
        if (e.target === fullscreenViewer) closeFullScreen();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && fullscreenViewer.classList.contains('active')) closeFullScreen();
    });
    
    function getFilteredProperties() {
        const city = document.getElementById('cityFilter').value;
        const areaQuery = document.getElementById('areaFilter').value.toLowerCase().trim();
        const budgetVal = document.getElementById('budgetFilter').value;
        const bhk = document.getElementById('bhkFilter').value;
    
        return properties.filter(prop => {
            if (city !== 'all' && prop.city !== city) return false;
            if (areaQuery && !prop.area.toLowerCase().includes(areaQuery) && !prop.title.toLowerCase().includes(areaQuery)) return false;
            if (bhk !== 'all' && prop.bhk !== bhk) return false;
            if (budgetVal !== 'any') {
                const maxBudget = parseInt(budgetVal);
                if (prop.price > maxBudget) return false;
            }
            return true;
        });
    }
    
    function applyFilters() {
        renderCards(getFilteredProperties());
    }
    
    function resetFilters() {
        document.getElementById('cityFilter').value = 'all';
        document.getElementById('areaFilter').value = '';
        document.getElementById('budgetFilter').value = 'any';
        document.getElementById('bhkFilter').value = 'all';
        applyFilters();
    }
    
    let currentProperty = null;
    function openModal(propertyId) {
        const prop = properties.find(p => p.id === propertyId);
        if (!prop) return;
        
        // Increment instantly (no waiting)
        const newCount = incrementAndSync(prop.id);
        currentProperty = prop;
        
        const modal = document.getElementById('propertyModal');
        const modalContent = document.getElementById('modalContent');
        
        const galleryHtml = prop.images.map(img => `<img class="modal-img" src="${img}" alt="property view" onclick="openFullScreen('${img}')">`).join('');        
        modalContent.innerHTML = `
            <div class="modal-img-gallery">${galleryHtml}</div>
            <div class="modal-body">
                <span class="modal-property-code"><i class="fas fa-tag"></i> Property Code: <strong>${prop.code}</strong></span>
                <h2 style="margin: 12px 0 8px">${prop.title}</h2>
                <p><i class="fas fa-location-dot"></i> ${prop.area}, ${prop.city}</p>
                <div style="display: flex; gap: 1rem; margin: 12px 0; flex-wrap: wrap;">
                    <span><i class="fas fa-bed"></i> ${prop.bhk}</span>
                    <span><i class="fas fa-arrows-alt"></i> ${prop.size}</span>
                    <span><i class="fas fa-layer-group"></i> ${prop.floor}</span>
                    <span><i class="fas fa-calendar"></i> Available: ${prop.available}</span>
                </div>
                <div style="background: #f0f7fb; padding: 14px; border-radius: 16px; margin: 12px 0;">
                    <strong>📝 Description:</strong><br> ${prop.desc}<br><br>
                    <strong>✨ Features:</strong><br> ${prop.features || 'Contact for more details'}
                </div>
                <div style="margin-top: 12px;">
                    <strong>💰 Monthly Rent:</strong> ₹${prop.price.toLocaleString()} + maintenance as applicable
                </div>
                <div class="visitor-counter" style="margin-top: 16px; background: #eef2f8;">
                    <i class="fas fa-globe"></i> 🌍 Total Global Views: <strong>${newCount}</strong> times
                </div>
                <button id="sendQueryWhatsAppBtn" class="send-query-btn"><i class="fab fa-whatsapp"></i> Send Query on WhatsApp</button>
            </div>
        `;
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        const whatsBtn = document.getElementById('sendQueryWhatsAppBtn');
        if (whatsBtn) {
            whatsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const YOUR_WHATSAPP_NUMBER = "917311170545";
                const message = `🏠 *StayLoo Property Inquiry*\n\nProperty: ${currentProperty.title}\n📍 Area: ${currentProperty.area}, ${currentProperty.city}\n🏷️ Property Code: ${currentProperty.code}\n🏠 Type: ${currentProperty.bhk}\n💰 Rent: ₹${currentProperty.price}\n👁️ Total Views: ${newCount}\n\nI'm interested in this property. Please share more details and schedule a visit.`;
                window.open(`https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
            });
        }
    }
    
    const modal = document.getElementById('propertyModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    function closeModalFunc() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
    closeModalBtn.addEventListener('click', closeModalFunc);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalFunc();
    });
    
    window.openFullScreen = openFullScreen;
    window.openModal = openModal;
    
    document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);
    document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
    
    // Load page: Show cards instantly, load global counts in background
    window.addEventListener('DOMContentLoaded', async () => {
        renderCards(properties.slice(0, 5));
        await loadGlobalCounts();
        renderCards(getFilteredProperties().slice(0, 5));
    });
</script>
</body>
</html>
