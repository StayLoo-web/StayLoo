    function getHalfBlurredNumber(fullNumber) {
        const cleanNumber = fullNumber.replace(/[\s+]/g, '');

        const hiddenPart = cleanNumber.slice(0, length - halfLength);
        const maskedNumber = '•'.repeat(hiddenPart.length) + visiblePart;
        if (fullNumber.startsWith('+')) {

          videos: [], desc: "High-street location, cafes nearby.", size: "1200 sqft", floor: "6th Floor", available: "Negotiable", features: "Premium Location, Modern Kitchen, Parking, Lift", fullAddress: "5th Block, Koramangala, 80ft Road, Bangalore - 560034" }
    ];

    let savedScrollPosition = 0;
    let isModalOpen = false;

    function storeScrollPosition() {
        savedScrollPosition = window.scrollY || document.documentElement.scrollTop;
    }

    function restoreScrollPosition() {
        window.scrollTo(0, savedScrollPosition);
    }

    function openOwnerPopup(propertyId) {
        const owner = ownersData[propertyId];
        if(!owner) return;
        storeScrollPosition();
        const imgContainer = document.getElementById('ownerPopupImgContainer');
        imgContainer.innerHTML = '<i class="fas fa-user-circle" style="font-size: 4rem;"></i>';
        document.getElementById('ownerPopupName').innerText = owner.name;
        document.getElementById('ownerPopupBio').innerText = owner.bio;
        document.getElementById('ownerPopupContact').innerText = getHalfBlurredNumber(owner.contact);
        document.getElementById('ownerPopup').classList.add('active');
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        document.body.style.top = `-${savedScrollPosition}px`;
        isModalOpen = true;
    }
    
    function closeOwnerPopup() {
        document.getElementById('ownerPopup').classList.remove('active');
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width = '';
        document.body.style.top = '';
        restoreScrollPosition();
        isModalOpen = false;
    }
    
    document.getElementById('closeOwnerPopupBtn').onclick = closeOwnerPopup;
    document.getElementById('ownerPopup').onclick = (e) => { if(e.target === document.getElementById('ownerPopup')) closeOwnerPopup(); };
    
    // Fullscreen viewer
    const fullscreenViewer = document.createElement('div');
    fullscreenViewer.className = 'fullscreen-img-viewer';
    fullscreenViewer.innerHTML = `<button class="close-fullscreen">&times;</button><img class="fullscreen-img" src="">`;
    document.body.appendChild(fullscreenViewer);
    const fullscreenImg = fullscreenViewer.querySelector('.fullscreen-img');
    const closeFullscreenBtn = fullscreenViewer.querySelector('.close-fullscreen');
    window.openFullScreen = function(imgSrc) { 
        fullscreenImg.src = imgSrc; 
        fullscreenViewer.classList.add('active'); 
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
    };
    closeFullscreenBtn.onclick = () => { 
        fullscreenViewer.classList.remove('active'); 
        if (!isModalOpen) {
            document.body.style.overflow = '';
            document.body.style.position = '';
        } else {
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
        }
    };
    fullscreenViewer.onclick = (e) => { if (e.target === fullscreenViewer) closeFullscreenBtn.click(); };
    
    function renderCards(filteredProps) {
        const grid = document.getElementById('propertiesGrid');
        if (!filteredProps.length) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 3rem;">🏠 No properties match your criteria.</div>`; return; }
        grid.innerHTML = filteredProps.map(prop => {
            const owner = ownersData[prop.id];
            const avatarHtml = `<div class="owner-avatar blank-avatar"><i class="fas fa-user-circle"></i></div>`;
            const badges = propertyBadges[prop.id] || { verified: false, popular: false };
            let badgesHtml = '';
            if (badges.verified) badgesHtml += `<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>`;
            if (badges.popular) badgesHtml += `<span class="popular-badge"><i class="fas fa-fire"></i> Popular</span>`;
            return `
            <div class="property-card">
                <div onclick="openModal('${prop.id}')">
                    <div class="card-img" style="background-image: url('${prop.images[0]}');">
                        <div class="badge-container">${badgesHtml}</div>
                        <span class="property-code-badge">📌 ${prop.code}</span>
                    </div>
                </div>
                <div class="card-content">
                    <div onclick="openModal('${prop.id}')" style="cursor:pointer;">
                        <div class="card-title">${prop.title}</div>
                        <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${prop.area}, ${prop.city}</div>
                        <div class="card-details"><span>🏠 ${prop.bhk}</span><span>📏 ${prop.size || 'N/A'}</span></div>
                        <div class="price">₹${prop.price.toLocaleString()}/month</div>
                    </div>
                    <div class="owner-section" onclick="openOwnerPopup('${prop.id}')">
                        ${avatarHtml}
                        <div class="owner-info-text">
                            Know more about owner <i class="fas fa-chevron-right"></i><br>
                            <small>${owner ? owner.name : "Verified Partner"}</small>
                        </div>
                    </div>
                    <div class="view-details" onclick="openModal('${prop.id}')"><i class="fas fa-eye"></i> View Details</div>
                </div>
            </div>
        `}).join('');
    }
    
    function getFilteredProperties() {
        const city = document.getElementById('cityFilter').value;
        const areaQuery = document.getElementById('areaFilter').value.toLowerCase().trim();
        const budgetVal = document.getElementById('budgetFilter').value;
        const bhk = document.getElementById('bhkFilter').value;
        return properties.filter(prop => {
            if (city !== 'all' && prop.city !== city) return false;
            if (areaQuery && !prop.area.toLowerCase().includes(areaQuery) && !prop.title.toLowerCase().includes(areaQuery)) return false;
            if (bhk !== 'all' && prop.bhk !== bhk) return false;
            if (budgetVal !== 'any') { const maxBudget = parseInt(budgetVal); if (prop.price > maxBudget) return false; }
            return true;
        });
    }
    
    function applyFilters() { renderCards(getFilteredProperties()); }
    function resetFilters() { document.getElementById('cityFilter').value = 'all'; document.getElementById('areaFilter').value = ''; document.getElementById('budgetFilter').value = 'any'; document.getElementById('bhkFilter').value = 'all'; applyFilters(); }
    
    let currentProperty = null;
    window.openModal = function(propertyId) {
        const prop = properties.find(p => p.id === propertyId);
        if (!prop) return;
        currentProperty = prop;
        storeScrollPosition();
        isModalOpen = true;
        const modal = document.getElementById('propertyModal');
        const modalContent = document.getElementById('modalContent');
        let mediaHtml = prop.images.map(img => `<img class="modal-img" src="${img}" onclick="openFullScreen('${img}')">`).join('');
        if(prop.videos && prop.videos.length){
            prop.videos.forEach(vid => {
                mediaHtml += `<div class="modal-video-item" onclick="openFullScreen('${vid}')"><video preload="metadata" style="width:100%; height:100%; border-radius:1rem;"><source src="${vid}" type="video/mp4"></video><div style="position:absolute;bottom:5px;right:8px;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:15px;font-size:10px;color:white;"><i class="fas fa-expand"></i></div></div>`;
            });
        }
        // CHANGES: "Features" changed to "Amenities" and added Full Address block
        modalContent.innerHTML = `
            <div class="modal-img-gallery">${mediaHtml}</div>
            <div class="modal-body">
                <span class="modal-property-code"><i class="fas fa-tag"></i> Property Code: <strong>${prop.code}</strong></span>
                <h2 style="margin:12px 0 8px">${prop.title}</h2>
                <p><i class="fas fa-location-dot"></i> ${prop.area}, ${prop.city}</p>
                <div style="display:flex; gap:1rem; margin:12px 0; flex-wrap:wrap;">
                    <span><i class="fas fa-bed"></i> ${prop.bhk}</span>
                    <span><i class="fas fa-arrows-alt"></i> ${prop.size || 'N/A'}</span>
                    <span><i class="fas fa-layer-group"></i> ${prop.floor}</span>
                    <span><i class="fas fa-calendar"></i> Available: ${prop.available}</span>
                </div>
                <div style="background:#f0f7fb; padding:14px; border-radius:16px; margin:12px 0;">
                    <strong>📝 Description:</strong><br> ${prop.desc}<br><br>
                    <strong>✨ Amenities:</strong><br> ${prop.features}<br><br>
                    <strong>📍 Full Address:</strong><br> ${prop.fullAddress}
                </div>
                <div><strong>💰 Monthly Rent:</strong> ₹${prop.price.toLocaleString()} + maintenance</div>
                <button id="sendQueryWhatsAppBtn" class="send-query-btn"><i class="fab fa-whatsapp"></i> Send Query on WhatsApp</button>
            </div>
        `;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        document.body.style.top = `-${savedScrollPosition}px`;
        
        document.getElementById('sendQueryWhatsAppBtn')?.addEventListener('click', () => {
            const YOUR_WHATSAPP_NUMBER = "919170548739";
            const message = `🏠 *STAYLOO ROOM INQUIRY* 🏠
Hey StayLoo! I'm interested in this room.
━━━━━━━━━━━━━━━━━━━━━
📌 *Property Code:* ${currentProperty.code}
🏢 *Property Name:* ${currentProperty.title}
📍 *Location:* ${currentProperty.area}, ${currentProperty.city}
🏠 *BHK Type:* ${currentProperty.bhk}
💰 *Monthly Rent:* ₹${currentProperty.price.toLocaleString()}
📏 *Size:* ${currentProperty.size || 'N/A'}
📍 *Full Address:* ${currentProperty.fullAddress}
━━━━━━━━━━━━━━━━━━━━━`;
            window.open(`https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        });
    };
    
    function closeModal() {
        const modal = document.getElementById('propertyModal');
        if (modal.classList.contains('active')) {
            modal.classList.remove('active');
            document.body.style.overflow = '';
            document.body.style.position = '';
            document.body.style.width = '';
            document.body.style.top = '';
            restoreScrollPosition();
            isModalOpen = false;
        }
    }
    
    const modal = document.getElementById('propertyModal');
    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    document.getElementById('applyFilterBtn').onclick = applyFilters;
    document.getElementById('resetFilterBtn').onclick = resetFilters;
    
    // Handle browser back button
    window.addEventListener('popstate', function(event) {
        const modalEl = document.getElementById('propertyModal');
        const ownerPopupEl = document.getElementById('ownerPopup');
        const fsViewer = document.querySelector('.fullscreen-img-viewer');
        if (fsViewer && fsViewer.classList.contains('active')) {
            event.preventDefault();
            closeFullscreenBtn.click();
        } else if (modalEl.classList.contains('active')) {
            event.preventDefault();
            closeModal();
        } else if (ownerPopupEl.classList.contains('active')) {
            event.preventDefault();
            closeOwnerPopup();
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => { renderCards(properties); });
</script>
